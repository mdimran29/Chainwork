[toolchain]
anchor_version = "0.32.1"
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.devnet]
sol_marketplace = "BKrfKJSFgPP1jvAZDLxQymwQYov8ktZntVdE9TBLHrLr"

[programs.localnet]
sol_marketplace = "BKrfKJSFgPP1jvAZDLxQymwQYov8ktZntVdE9TBLHrLr"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
